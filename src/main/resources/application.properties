spring.application.name=restapi
# H2 Database Connection
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Enable response compression
server.compression.enabled=true

# Specify which MIME types should be compressed (JSON and XML)
server.compression.mime-types=application/json,application/xml,text/html,text/xml

# Only compress if the response is larger than 2KB (not worth it for tiny files)
server.compression.min-response-size=0

# Use both Gzip and Brotli (Spring Boot supports these by default)
springdoc.show-actuator=true
# This helps SpringDoc handle the Pageable parameter correctly
springdoc.model-and-view-resolved-as-json=true


